webdriver {
  driver = chrome
  # No fijamos la ruta del chromedriver aqui. WebDriverManager lo descarga
  # automaticamente en cada maquina segun la version de Chrome instalada
  # (ver el metodo configurarActor en los StepDefinitions), porque el Selenium
  # Manager que trae esta version de Serenity no resuelve las versiones nuevas de Chrome.
}
headless.mode = false
serenity {
  project.name = "Automatizacion Simuladores Bancolombia"
  take.screenshots = AFTER_EACH_STEP
  test.root = "com.bancolombia.certificacion.runners"
  report.encoding = UTF-8
}
chrome.switches = "--disable-popup-blocking;--disable-notifications;--no-sandbox;--disable-dev-shm-usage"
